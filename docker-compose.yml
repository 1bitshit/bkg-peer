services:
  bkg-peer:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - BKG_PEER_LOG=info
    volumes:
      - bkg-peer-data:/data/.bkg-peer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  bkg-peer-data:
